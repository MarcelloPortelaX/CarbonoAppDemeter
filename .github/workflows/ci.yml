name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  mobile:
    name: Mobile Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
      - name: Install Dependencies
        working-directory: ./apps/mobile
        run: npm ci
      - name: Typecheck
        working-directory: ./apps/mobile
        run: npm run typecheck
      - name: Lint
        working-directory: ./apps/mobile
        run: npm run lint
      - name: Test
        working-directory: ./apps/mobile
        run: npm run test
      - name: Expo Doctor
        working-directory: ./apps/mobile
        run: npx expo-doctor
      - name: Expo Install Check
        working-directory: ./apps/mobile
        run: npx expo install --check
      - name: Android Export Check
        working-directory: ./apps/mobile
        run: npx expo export --platform android --clear

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: ./services/api
        run: pip install -e ".[dev]"
      - name: Ruff Check
        working-directory: ./services/api
        run: ruff check .
      - name: Mypy
        working-directory: ./services/api
        run: python -m mypy app
      - name: Pytest without DB
        working-directory: ./services/api
        run: pytest -m "not integration"

  integration:
    name: PostGIS Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: demeter
          POSTGRES_PASSWORD: demeter_password
          POSTGRES_DB: demeter_carbono_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        working-directory: ./services/api
        run: pip install -e ".[dev]" psycopg2-binary
      - name: Run Migrations
        working-directory: ./services/api
        env:
          DATABASE_URL: postgresql+asyncpg://demeter:demeter_password@localhost:5432/demeter_carbono_test
          SYNC_DATABASE_URL: postgresql://demeter:demeter_password@localhost:5432/demeter_carbono_test
        run: alembic upgrade head
      - name: Run Pytest Integration
        working-directory: ./services/api
        env:
          DATABASE_URL: postgresql+asyncpg://demeter:demeter_password@localhost:5432/demeter_carbono_test
          TEST_DATABASE_URL: postgresql+asyncpg://demeter:demeter_password@localhost:5432/demeter_carbono_test
        run: pytest -m integration
