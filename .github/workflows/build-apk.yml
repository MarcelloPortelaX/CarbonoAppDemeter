name: Build APK

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Criar GitHub Release após os testes"
        required: true
        type: boolean
        default: false
      send_email:
        description: "Enviar e-mail após publicação bem-sucedida"
        required: true
        type: boolean
        default: false

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build_apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: google_auth
        uses: google-github-actions/auth@v3
        with:
          project_id: demeter-carbono-app-202607
          workload_identity_provider: projects/356486903021/locations/global/workloadIdentityPools/github-actions-pool/providers/github

      - name: Load Google Maps build key
        id: maps_secret
        uses: google-github-actions/get-secretmanager-secrets@v3
        with:
          secrets: |-
            google_maps_api_key:demeter-carbono-app-202607/google-maps-api-key

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies & Validate
        working-directory: apps/mobile
        run: |
          npm ci
          npm run typecheck
          npm run lint
          npm run test -- --runInBand
          npx expo-doctor
          npx expo install --check
          npx expo export --platform android --clear

      - name: Build APK locally (prebuild + gradlew)
        working-directory: apps/mobile
        env:
          APP_ENV: preview
          GOOGLE_MAPS_API_KEY: ${{ steps.maps_secret.outputs.google_maps_api_key }}
        run: |
          mkdir -p dist
          if [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "Error: GOOGLE_MAPS_API_KEY is required for the preview APK."
            exit 1
          fi
          export CI=1
          npx expo prebuild --platform android --clean
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease --stacktrace --no-daemon
          APK_PATH=$(find app/build/outputs/apk -type f -name "*.apk" -print | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: APK not found after gradle build."
            exit 1
          fi
          cp "$APK_PATH" ../dist/demeter-carbono.apk
          cd ..

      - name: Upload Artifact Candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demeter-carbono-apk-candidate
          path: apps/mobile/dist/demeter-carbono.apk
          if-no-files-found: ignore

      - name: Setup Android SDK Build-Tools
        uses: android-actions/setup-android@v3

      - name: Validate APK
        working-directory: apps/mobile
        run: |
          set -Eeuo pipefail
          APK="dist/demeter-carbono.apk"
          if [ ! -f "$APK" ]; then
            echo "Error: APK missing"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "$APK")
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "Error: Downloaded file is too small to be a valid APK."
            exit 1
          fi
          
          FILE_DESCRIPTION="$(file -b "$APK")"
          echo "File type: $FILE_DESCRIPTION"
          
          if ! echo "$FILE_DESCRIPTION" | grep -Eiq "Android package|APK|Zip archive"; then
            echo "Error: File is not recognized as an Android APK or ZIP archive."
            exit 1
          fi
          
          unzip -t "$APK" > /dev/null
          
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          AAPT="$(find "$ANDROID_HOME/build-tools" -type f -name aapt | sort -V | tail -n 1)"
          
          test -x "$APKSIGNER"
          test -x "$AAPT"
          
          "$APKSIGNER" verify --print-certs "$APK"
          "$AAPT" dump badging "$APK" > dist/apk-metadata.txt
          
          if ! grep -q "package: name='com.demeter.carbono'" dist/apk-metadata.txt; then
            echo "Error: Incorrect package name"
            exit 1
          fi
          
          if ! grep -q "launchable-activity" dist/apk-metadata.txt; then
            echo "Error: No launchable activity found"
            exit 1
          fi
          
          CERT_SHA1=$("$APKSIGNER" verify --print-certs "$APK" | sed -n -E 's/^(Signer #1|V[0-9]+ Signer): certificate SHA-1 digest: //p' | head -n 1)
          APK_SHA256=$(sha256sum "$APK" | cut -d' ' -f1)
          APP_VERSION=$(sed -n "s/.*versionName='\([^']*\)'.*/\1/p" dist/apk-metadata.txt | head -n 1)
          APP_BUILD_NUMBER=$(sed -n "s/.*versionCode='\([^']*\)'.*/\1/p" dist/apk-metadata.txt | head -n 1)

          test -n "$CERT_SHA1"
          test -n "$APK_SHA256"
          test -n "$APP_VERSION"
          test -n "$APP_BUILD_NUMBER"

          printf '%s  %s\n' "$APK_SHA256" "demeter-carbono.apk" > dist/demeter-carbono.apk.sha256
          jq -n \
            --arg git_sha "$GITHUB_SHA" \
            --arg version "$APP_VERSION" \
            --arg build_number "$APP_BUILD_NUMBER" \
            --arg environment "preview" \
            --arg package_name "com.demeter.carbono" \
            --arg signing_certificate_sha1 "$CERT_SHA1" \
            --arg apk_sha256 "$APK_SHA256" \
            --arg workflow_run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{git_sha: $git_sha, version: $version, build_number: $build_number, environment: $environment, package_name: $package_name, signing_certificate_sha1: $signing_certificate_sha1, apk_sha256: $apk_sha256, workflow_run_url: $workflow_run_url}' \
            > dist/release-provenance.json
          echo "APK validated successfully"

      - name: Upload APK Metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demeter-carbono-apk-metadata
          path: |
            apps/mobile/dist/demeter-carbono.apk.sha256
            apps/mobile/dist/apk-metadata.txt
            apps/mobile/dist/release-provenance.json
          if-no-files-found: ignore

  android_smoke_test:
    needs: build_apk
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifact Candidate
        uses: actions/download-artifact@v4
        with:
          name: demeter-carbono-apk-candidate
          path: apps/mobile/dist

      - name: Android Smoke Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            bash .github/scripts/android-smoke-test.sh

      - name: Upload Diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-test-diagnostics
          path: |
            logcat.txt
            window.xml
            apps/mobile/dist/apk-metadata.txt
            apps/mobile/dist/demeter-carbono.apk.sha256
          if-no-files-found: ignore

  publish:
    needs: [build_apk, android_smoke_test]
    if: inputs.publish == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Verified Artifact
        uses: actions/download-artifact@v4
        with:
          name: demeter-carbono-apk-candidate
          path: apps/mobile/dist

      - name: Download Artifact Metadata
        uses: actions/download-artifact@v4
        with:
          name: demeter-carbono-apk-metadata
          path: apps/mobile/dist

      - name: Determine Tag
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +'%Y%m%d-%H%M')
          echo "tag=apk-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            apps/mobile/dist/demeter-carbono.apk
            apps/mobile/dist/demeter-carbono.apk.sha256
            apps/mobile/dist/apk-metadata.txt
            apps/mobile/dist/release-provenance.json
          draft: false
          generate_release_notes: true

      - name: Setup Python
        if: inputs.send_email == true
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send Email Notification
        if: inputs.send_email == true
        env:
          APK_EMAIL_SENDER: ${{ secrets.APK_EMAIL_SENDER }}
          APK_EMAIL_APP_PASSWORD: ${{ secrets.APK_EMAIL_APP_PASSWORD }}
          APK_EMAIL_RECIPIENT: ${{ secrets.APK_EMAIL_RECIPIENT }}
          GITHUB_SHA: ${{ github.sha }}
          APP_VERSION: ${{ steps.vars.outputs.tag }}
          APK_PATH: apps/mobile/dist/demeter-carbono.apk
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.vars.outputs.tag }}
        run: |
          if [ -z "$APK_EMAIL_SENDER" ] || [ -z "$APK_EMAIL_APP_PASSWORD" ] || [ -z "$APK_EMAIL_RECIPIENT" ]; then
            echo "Error: Email requested, but APK_EMAIL_SENDER/APK_EMAIL_APP_PASSWORD/APK_EMAIL_RECIPIENT are missing."
            exit 1
          fi
          python scripts/send-apk-email.py
