name: Build APK

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Error: EXPO_TOKEN is missing or empty!"
          fi
          if [ -z "${{ secrets.APK_EMAIL_SENDER }}" ] || [ -z "${{ secrets.APK_EMAIL_APP_PASSWORD }}" ]; then
            echo "Warning: Email secrets missing. APK will be built but email will not be sent."
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies & Typecheck
        working-directory: ./apps/mobile
        run: |
          npm ci
          npm run typecheck

      - name: Build APK via EAS
        id: eas-build
        working-directory: ./apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          mkdir -p dist
          echo "Starting remote EAS build..."
          eas build --platform android --profile preview --non-interactive --wait --json > build_result.json
          
          ARTIFACT_URL=$(jq -r '.[0].artifacts.buildUrl' build_result.json)
          if [ "$ARTIFACT_URL" = "null" ] || [ -z "$ARTIFACT_URL" ]; then
            echo "Error: Could not retrieve artifact URL from EAS."
            cat build_result.json
            exit 1
          fi
          
          echo "Downloading APK from $ARTIFACT_URL..."
          curl -L -o dist/demeter-carbono.apk "$ARTIFACT_URL"
          
          FILE_SIZE=$(stat -c%s "dist/demeter-carbono.apk")
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "Error: Downloaded file is too small to be a valid APK."
            exit 1
          fi
          
          FILE_TYPE=$(file -b dist/demeter-carbono.apk)
          if echo "$FILE_TYPE" | grep -q "HTML"; then
            echo "Error: Downloaded file is HTML."
            exit 1
          fi
          
          echo "APK validated successfully."

      - name: Android Smoke Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: playstore
          arch: x86_64
          profile: pixel
          script: |
            echo "Installing APK..."
            adb install -r apps/mobile/dist/demeter-carbono.apk
            echo "Starting App..."
            adb shell monkey -p com.demeter.carbono -c android.intent.category.LAUNCHER 1
            echo "Waiting for app to launch..."
            sleep 15
            echo "Checking process..."
            adb logcat -d > logcat.txt
            if ! adb shell pidof com.demeter.carbono > /dev/null; then
              echo "Error: App process is not running!"
              cat logcat.txt
              exit 1
            fi
            if grep -q "FATAL EXCEPTION\|AndroidRuntime\|SIGABRT\|SIGSEGV" logcat.txt; then
              echo "Error: Critical crash found in logcat!"
              cat logcat.txt
              exit 1
            fi
            echo "Smoke test passed!"

      - name: Upload Logcat on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-failure
          path: logcat.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: demeter-carbono-apk
          path: apps/mobile/dist/demeter-carbono.apk

      - name: Determine Tag
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${github.ref#refs/tags/}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}" | cut -c1-7)
            TIMESTAMP=$(date +'%Y%m%d-%H%M')
            echo "tag=apk-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          files: apps/mobile/dist/demeter-carbono.apk
          draft: false
          generate_release_notes: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Send Email Notification
        env:
          APK_EMAIL_SENDER: ${{ secrets.APK_EMAIL_SENDER }}
          APK_EMAIL_APP_PASSWORD: ${{ secrets.APK_EMAIL_APP_PASSWORD }}
          GITHUB_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          APP_VERSION: ${{ steps.vars.outputs.tag }}
          API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          APK_PATH: apps/mobile/dist/demeter-carbono.apk
          RELEASE_URL: ${{ steps.create_release.outputs.url }}
        run: |
          if [ -n "$APK_EMAIL_SENDER" ] && [ -n "$APK_EMAIL_APP_PASSWORD" ]; then
            python scripts/send-apk-email.py
          else
            echo "Email notification was skipped because email secrets are missing."
          fi
