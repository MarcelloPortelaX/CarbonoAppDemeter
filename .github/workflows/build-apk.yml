name: Build APK

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-apk:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        working-directory: ./apps/mobile
        run: npm ci
      - name: Build APK locally
        working-directory: ./apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: eas build -p android --profile preview --local --non-interactive --output dist/demeter-carbono.apk
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: demeter-carbono-apk
          path: apps/mobile/dist/demeter-carbono.apk
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: apps/mobile/dist/demeter-carbono.apk
          name: Release ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Send Email Notification
        env:
          APK_EMAIL_SENDER: ${{ secrets.APK_EMAIL_SENDER }}
          APK_EMAIL_APP_PASSWORD: ${{ secrets.APK_EMAIL_APP_PASSWORD }}
          GITHUB_SHA: ${{ github.sha }}
          APP_VERSION: ${{ github.ref_name }}
          API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          APK_PATH: apps/mobile/dist/demeter-carbono.apk
        run: python scripts/send-apk-email.py
